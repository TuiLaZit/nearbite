name: nearbite_mobile
description: Native mobile app for NearBite customer and owner roles.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.6.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.2.1
  connectivity_plus: ^6.1.1
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  just_audio: ^0.9.40
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/logo-1024.png
  min_sdk_android: 21
  adaptive_icon_foreground: assets/brand/logo-1024.png
  adaptive_icon_background: "#F4F7F7"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
