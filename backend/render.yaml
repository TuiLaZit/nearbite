services:
  - type: web
    name: nearbite-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:${PORT:-10000} --workers 2 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
    # Thêm environment variables từ Render Dashboard:
    # - SUPABASE_URL
    # - SUPABASE_KEY
    # - SECRET_KEY (generate random string)
    # - DATABASE_URL
